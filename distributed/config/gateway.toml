# gateway.toml — ZisK Gateway Docker configuration
#
# Mounted into the gateway container at /etc/zisk/gateway.toml.
# Override individual values via environment variables:
#   ZISK_GATEWAY__SERVER__PORT=8000
#   ZISK_GATEWAY__LOGGING__LEVEL=debug

[service]
name        = "ZisK Gateway"
environment = "production"

[server]
host                     = "0.0.0.0"
port                     = 7000
shutdown_timeout_seconds = 30

[metrics]
enabled = true
host    = "0.0.0.0"
port    = 9090

[logging]
level  = "info"
format = "json"

[backend]
mode = "coordinator"

[coordinator]
# Port on which the embedded coordinator listens for worker connections.
# Workers must connect to this port on the gateway host/container.
worker_port = 50051
# config_file = "/etc/zisk/coordinator.toml"  # optional: tune coordinator internals
