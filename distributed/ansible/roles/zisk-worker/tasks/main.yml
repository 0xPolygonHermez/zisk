---
- name: Validate required role inputs
  ansible.builtin.assert:
    that:
      - zisk_worker_binary_src | length > 0
      - ansible_facts['os_family'] != 'Darwin'
    fail_msg: >-
      zisk-worker role requires a Linux target and zisk_worker_binary_src
      pointing at a pre-built binary on the Ansible control host.

- name: Validate MPI parameter triplet (all-or-none)
  ansible.builtin.assert:
    that:
      - (zisk_worker_mpi_processes | string == "" and
         zisk_worker_mpi_numa_ppr | string == "" and
         zisk_worker_mpi_threads | string == "")
        or
        (zisk_worker_mpi_processes | string != "" and
         zisk_worker_mpi_numa_ppr | string != "" and
         zisk_worker_mpi_threads | string != "")
    fail_msg: >-
      zisk_worker_mpi_processes, zisk_worker_mpi_numa_ppr, and
      zisk_worker_mpi_threads must all be set or all empty.
  when: zisk_worker_mpi_enabled

- ansible.builtin.import_tasks: user.yml
- ansible.builtin.import_tasks: mpi_facts.yml
  when: zisk_worker_mpi_enabled
- ansible.builtin.import_tasks: binary.yml
- ansible.builtin.import_tasks: service.yml
