[package]
name = "zisk-worker"
description = "Distributed Network Client"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "zisk-worker"
path = "src/cli/main.rs"

[build-dependencies]
vergen-git2.workspace = true

[dependencies]
zisk-cluster-common = { workspace = true }
zisk-cluster-api = { workspace = true }
zisk-coordinator = { workspace = true }

zisk-common = { workspace = true }
zisk-prover-backend = { workspace = true }
proofman = { workspace = true }
proofman-common = { workspace = true }
bincode = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }

tonic = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
borsh = { workspace = true }
clap = { workspace = true }
colored = { workspace = true }
config = { workspace = true }
uuid = { workspace = true }

[features]
default = []
cpu-only = ["zisk-prover-backend/cpu-only"]
