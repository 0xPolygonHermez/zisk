syntax = "proto3";

package zisk.node.v1;

// ─── Service ──────────────────────────────────────────────────────────────────

service ZiskNodeApi {
  // Query the node's version and operational status.
  rpc GetNodeInfo (GetNodeInfoRequest) returns (NodeInfo);
}

// ─── Messages ─────────────────────────────────────────────────────────────────

message GetNodeInfoRequest {}

message NodeInfo {
  string version = 1;
  string status  = 2; // e.g. "ready", "degraded"
}
