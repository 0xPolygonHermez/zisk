syntax = "proto3";

package zisk.coordinator.v1;

import "google/protobuf/timestamp.proto";
import "zisk_common.proto";

// ============================================================================
// External coordinator API — called by the node gateway and operators.
// ============================================================================

service ZiskCoordinatorApi {
  // Liveness check.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Overall system health metrics (workers, capacity, active jobs).
  rpc SystemStatus(SystemStatusRequest) returns (SystemStatusResponse);

  // Detailed coordinator status (uptime, metrics, version).
  rpc StatusInfo(StatusInfoRequest) returns (StatusInfoResponse);

  // List all jobs (active and completed).
  rpc JobsList(JobsListRequest) returns (JobsListResponse);

  // Query the status of a specific job by ID.
  rpc JobStatus(JobStatusRequest) returns (JobStatusResponse);

  // List connected workers.
  rpc WorkersList(WorkersListRequest) returns (WorkersListResponse);

  // Submit a new proof generation job.
  rpc LaunchProof(LaunchProofRequest) returns (LaunchProofResponse);

  // Cancel a running or pending job.
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);

  // Register a new guest program. Returns immediately; workers run rom-setup async.
  rpc RegisterProgram(RegisterProgramRequest) returns (RegisterProgramResponse);

  // List all registered programs.
  rpc ListPrograms(ListProgramsRequest) returns (ListProgramsResponse);

  // Get a registered program by program_id, hash_id, or name.
  rpc GetProgram(GetProgramRequest) returns (GetProgramResponse);

  // Update mutable fields of an existing program. Supplying a new zisk_elf
  // recomputes hash_id and re-triggers rom-setup on all workers.
  rpc UpdateProgram(UpdateProgramRequest) returns (UpdateProgramResponse);

  // Delete a registered program by program_id or hash_id.
  rpc DeleteProgram(DeleteProgramRequest) returns (DeleteProgramResponse);

  // Long-poll: holds the response for up to 5 seconds. Returns immediately when
  // the program reaches a terminal state (Ready or Failed); otherwise returns
  // after 5 seconds with the current status so the caller can re-issue.
  // Clients MUST set a gRPC deadline > 5 s (recommended: 30 s).
  rpc WaitProgram(WaitProgramRequest) returns (GetProgramResponse);

  // Long-poll: holds the response for up to 5 seconds. Returns immediately when
  // the job reaches a terminal state (Completed, Failed, or Cancelled); otherwise
  // returns after 5 seconds with the current status so the caller can re-issue.
  // Clients MUST set a gRPC deadline > 5 s (recommended: 30 s).
  rpc WaitJob(WaitJobRequest) returns (JobStatusResponse);

  // Subscribe to state events for an existing job. Sends the current state
  // immediately on connect, then streams each transition until a terminal state
  // (Completed, Failed, or Cancelled) is reached, then closes the stream.
  // Safe to call after the job has already finished — the terminal event is
  // synthesised from stored state and the stream closes immediately.
  rpc WatchJob(WatchJobRequest) returns (stream JobStateEvent);
}

// ── Requests ─────────────────────────────────────────────────────────────────

message HealthCheckRequest {}

message SystemStatusRequest {}

message StatusInfoRequest {}

message JobsListRequest {
  bool active_only = 1;
}

message JobStatusRequest {
  string job_id = 1;
}

message WorkersListRequest {
  bool available_only = 1;
}

message CancelJobRequest {
  string job_id = 1;
  optional string reason = 2;
}

message CancelJobResponse {
  oneof result {
    CancelJobSuccess job = 1;
    ErrorResponse error = 2;
  }
}

message CancelJobSuccess {
  string job_id = 1;
  // State the job was in before cancellation (e.g. "Created", "Running").
  string previous_state = 2;
  // Phase within the running state. Absent if previous_state was not "Running".
  optional string phase = 3;
}

message LaunchProofRequest {
  string data_id = 1;
  uint32 compute_capacity = 2;
  uint32 minimal_compute_capacity = 3;
  InputMode inputs_mode = 4;
  optional string inputs_uri = 5;
  HintsMode hints_mode = 6;
  optional string hints_uri = 7;
  optional uint32 simulated_node = 8;
  optional bytes hints_inline = 9; // present when hints_mode == HINTS_MODE_INLINE
}

// ── Responses ────────────────────────────────────────────────────────────────

message HealthCheckResponse {}

message SystemStatusResponse {
  oneof result {
    SystemStatus status = 1;
    ErrorResponse error = 2;
  }
}

message StatusInfoResponse {
  string service_name = 1;
  string version = 2;
  uint64 uptime_seconds = 3;
  google.protobuf.Timestamp start_time = 4;
  Metrics metrics = 5;
}

message JobsListResponse {
  oneof result {
    JobsList jobs_list = 1;
    ErrorResponse error = 2;
  }
}

message JobStatusResponse {
  oneof result {
    JobStatus job = 1;
    ErrorResponse error = 2;
  }
}

message WorkersListResponse {
  oneof result {
    WorkersList workers_list = 1;
    ErrorResponse error = 2;
  }
}

message LaunchProofResponse {
  oneof result {
    string job_id = 1;
    ErrorResponse error = 2;
  }
}

// ── Domain messages ───────────────────────────────────────────────────────────

message SystemStatus {
  uint32 total_workers = 1;
  uint32 compute_capacity = 2;
  uint32 idle_workers = 3;
  uint32 busy_workers = 4;
  uint32 active_jobs = 5;
}

message Metrics {
  uint32 active_connections = 1;
}

message JobsList {
  repeated JobStatus jobs = 1;
}

message JobStatus {
  string job_id = 1;
  string data_id = 2;
  string phase = 3;
  string state = 4;
  repeated string assigned_workers = 5;
  uint64 start_time = 6;
  uint64 duration_ms = 7;
}

message WorkersList {
  repeated WorkerInfo workers = 1;
}

message WorkerInfo {
  string worker_id = 1;
  string state = 2;
  zisk.common.v1.ComputeCapacity compute_capacity = 3;
  google.protobuf.Timestamp connected_at = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
}

// ── Shared enums ─────────────────────────────────────────────────────────────

enum InputMode {
  INPUT_MODE_NONE = 0;
  INPUT_MODE_PATH = 1;
  INPUT_MODE_DATA = 2;
}

enum HintsMode {
  HINTS_MODE_NONE   = 0;
  HINTS_MODE_PATH   = 1;
  HINTS_MODE_STREAM = 2;
  HINTS_MODE_INLINE = 3; // bytes embedded directly in LaunchProofRequest.hints_inline
}

// ── Programs ──────────────────────────────────────────────────────────────────

enum ProgramStatus {
  PROVISIONING = 0; // ELF received; workers are running rom-setup
  READY        = 1; // all workers have completed rom-setup
  FAILED       = 2; // one or more workers failed rom-setup
}

message ProgramInfo {
  string                    hash_id     = 1; // hash of zisk_elf
  string                    name        = 2;
  optional string           description = 3;
  optional string           author      = 4;
  ProgramStatus             status      = 5;
  string                    program_id  = 6; // UUID; stable across ELF updates
  optional string           metadata    = 7; // JSON
  google.protobuf.Timestamp created_at  = 8;
}

message RegisterProgramRequest {
  string          name        = 1;
  optional string description = 2;
  optional string author      = 3;
  bytes           zisk_elf    = 4;
  optional string metadata    = 5; // JSON
}

message RegisterProgramResponse {
  string        program_id = 1; // UUID
  string        hash_id    = 2;
  ProgramStatus status     = 3;
}

message ListProgramsRequest {}

message ListProgramsResponse {
  repeated ProgramInfo programs = 1;
}

message GetProgramRequest {
  oneof lookup {
    string hash_id    = 1;
    string program_id = 2;
    string name       = 3;
  }
}

message GetProgramResponse {
  ProgramInfo program = 1;
}

message UpdateProgramRequest {
  string          program_id  = 1; // UUID; identifies the program to update
  optional string name        = 2;
  optional string description = 3;
  optional string author      = 4;
  optional bytes  zisk_elf    = 5; // if set: recomputes hash_id, re-triggers rom-setup
  optional string metadata    = 6;
}

message UpdateProgramResponse {
  string        program_id = 1;
  string        hash_id    = 2; // new hash_id if zisk_elf was updated, otherwise unchanged
  ProgramStatus status     = 3;
}

message DeleteProgramRequest {
  oneof lookup {
    string hash_id    = 1;
    string program_id = 2;
  }
}

message DeleteProgramResponse {}

message WaitProgramRequest {
  string program_id = 1;
}

message WaitJobRequest {
  string job_id = 1;
  // How long the server should hold the connection waiting for a terminal state.
  // Enforced server-side minimum of 1 second. No upper bound. Defaults to 5 s if absent.
  optional uint32 timeout_seconds = 2;
}

message WatchJobRequest {
  string job_id = 1;
}

message JobStateEvent {
  string                    job_id    = 1;
  string                    state     = 2;  // "Created"|"Running"|"Completed"|"Failed"|"Cancelled"
  optional string           phase     = 3;  // present only when state == "Running"
  google.protobuf.Timestamp timestamp = 4;
}

// ── Error ─────────────────────────────────────────────────────────────────────

message ErrorResponse {
  string code = 1;
  string message = 2;
}
