syntax = "proto3";

package zisk.distributed.api.v1;

import "google/protobuf/timestamp.proto";

// ============================================================================
// gRPC Service Definition
// ============================================================================

service ZiskDistributedApi {
  // Bidirectional stream between worker(s) and coordinator
  rpc WorkerStream(stream WorkerMessage) returns (stream CoordinatorMessage);  
}

// Standardized error response
message ErrorResponse {
  string code = 1;      // Error code
  string message = 2;   // Human-readable error message
}

// ============================================================================
// STREAM MESSAGES from COORDINATOR <-> WORKER
// ============================================================================

// Messages from coordinator to worker
message CoordinatorMessage {
  oneof payload {
    Heartbeat heartbeat = 1;
    Shutdown shutdown = 2;
    WorkerRegisterResponse register_response = 3;
    ExecuteTaskRequest execute_task = 4;
    JobCancelled job_cancelled = 5;
    StreamData stream_data = 6;
    SetupProgram setup_program = 7;
    InputStreamData input_stream_data = 8;
    SetupRecurserAggregator setup_recurser_aggregator = 9;
    RunRecurserAggregator   run_recurser_aggregator   = 10;
  }
}

// Messages from worker to coordinator
message WorkerMessage {
  oneof payload {
    HeartbeatAck heartbeat_ack = 1;
    WorkerError error = 2;
    WorkerRegisterRequest register = 3;
    WorkerReconnectRequest reconnect = 4;
    ExecuteTaskResponse execute_task_response = 5;
    JobCancelledAck job_cancelled_ack = 6;
    SetupProgramAck setup_program_ack = 7;
    WorkerRecoveryComplete recovery_complete = 8;
    SetupRecurserAggregatorAck setup_recurser_aggregator_ack = 9;
    RunRecurserAggregatorAck   run_recurser_aggregator_ack   = 10;
  }
}

message WorkerRecoveryComplete {
  string worker_id = 1;
}

message SetupProgram {
  string job_id = 1;
  bytes elf_bytes = 2;
  string hash_id = 3;
  bool with_hints = 4;
  string program_name = 5;
  bool emulator_only = 6;
}

message SetupProgramAck {
  string job_id = 1;
  string worker_id = 2;
  string hash_id = 3;
  bool success = 4;
  string error_message = 5;
  bytes vk = 6;
  string hash_mode = 7;
}

// 4-limb Goldilocks verification key, decimal-encoded. Mirrors coordinator-api.
message ProgramVk {
  string l0 = 1;
  string l1 = 2;
  string l2 = 3;
  string l3 = 4;
}

message RecurserSpec {
  repeated ProgramVk program_vks            = 1;
  uint64             n_private_inputs       = 2;
  string             prepare_publics_body   = 3;
  string             check_publics_body     = 4;
  string             aggregate_publics_body = 5;
}

message SetupRecurserAggregator {
  string       job_id      = 1;
  string       recurser_id = 2;
  RecurserSpec spec        = 3;
}

message SetupRecurserAggregatorAck {
  string job_id        = 1;
  string worker_id     = 2;
  string recurser_id   = 3;
  bool   success       = 4;
  string error_message = 5;
  bytes  vk            = 6; // 32 bytes = 4 u64 LE
  string hash_mode     = 7;
}

message RunRecurserAggregator {
  string          job_id              = 1;
  string          recurser_id         = 2;
  bytes           proof_a             = 3; // bincode-serialized VadcopFinalProof
  bytes           proof_b             = 4;
  repeated uint64 private_inputs      = 5;
  repeated uint64 root_c_recurser_agg = 6; // optional override; len 0 or 4
}

message RunRecurserAggregatorAck {
  string job_id        = 1;
  string worker_id     = 2;
  bool   success       = 3;
  string error_message = 4;
  bytes  proof         = 5; // bincode-serialized SDK Proof
}

message JobCancelledAck {
  string worker_id = 1;
  string job_id = 2;
}

message Heartbeat {
  google.protobuf.Timestamp timestamp = 1;
}

message HeartbeatAck {
  string worker_id = 1;
}

message Shutdown {
  string reason = 1;
  uint32 grace_period_seconds = 2;
}

message WorkerRegisterRequest {
  string worker_id = 1;
  ComputeCapacity compute_capacity = 2; // Maximum compute capacity of a node/cluster
}

message WorkerReconnectRequest {
  string worker_id = 1;
  ComputeCapacity compute_capacity = 2; // Maximum compute capacity of a node/cluster
  optional string last_known_job_id = 3;
}

message WorkerRegisterResponse {
  string worker_id = 1;
  bool accepted = 2;
  string message = 3;
  google.protobuf.Timestamp registered_at = 4;
  optional ReconnectionDirective directive = 5;
  optional SetupProgram setup_program = 6;
}

message ExecuteTaskRequest {
  string worker_id = 1;
  string job_id = 2;
  TaskType task_type = 3;
  oneof params {
    ContributionParams contribution_params = 4;
    ProveParams prove_params = 5;
    AggParams agg_params = 6;
    ContributionParams execution_params = 7; // Same params as contribution, but only executes without proof generation
    WrapParams wrap_params = 8;
  }
}

enum TaskType {
  PARTIAL_CONTRIBUTION = 0;
  PROVE = 1;
  AGGREGATE = 2;
  EXECUTION = 3; // Execute-only mode without proof generation
  WRAP = 4;    // Wrap an existing vadcop proof into a minimal/snark proof
}

/// Target proof format for a job.
enum DistributedProofType {
  DISTRIBUTED_PROOF_TYPE_STARK         = 0; // VadcopFinal (default)
  DISTRIBUTED_PROOF_TYPE_STARK_MINIMAL = 1; // VadcopFinalMinimal
  DISTRIBUTED_PROOF_TYPE_PLONK         = 2; // Plonk/SNARK
}

message ContributionParams {
  string data_id = 1;
  oneof input_source {
    string input_path = 2;
    bytes input_data = 3;
  }
  optional string hints_path = 4;
  bool hints_stream = 5; // Indicates whether hints will be streamed
  optional bytes hints_data = 10; // Inline hints data
  uint32 rank_id = 6;
  uint32 total_workers = 7;
  repeated uint32 worker_allocation = 8;
  uint32 job_compute_units = 9;
  string hash_id = 11;
}

message ProveParams {
  repeated Challenges challenges = 1;
}

message AggParams {
  ProofList agg_proofs = 1;
  bool last_proof = 2;
  bool final_proof = 3;
  DistributedProofType proof_type = 4;
}

message WrapParams {
  bytes proof_data = 1; // bincode-encoded Proof
  int32 proof_dest = 2; // ProofKind: 1=VadcopFinalMinimal, 2=Plonk (VadcopFinal is not valid here)
}

message WrapResult {
  bytes proof_data = 1; // bincode-encoded Proof (wrapped proof)
}

// Stream type enumeration
enum StreamType {
  STREAM_TYPE_START = 0;
  STREAM_TYPE_DATA = 1;
  STREAM_TYPE_END = 2;
}

// Streaming messages for data transfer
message StreamData {
  string job_id = 1;
  StreamType stream_type = 2;
  optional StreamPayload payload = 3;
}

message StreamPayload {
  uint32 sequence_number = 3;
  bytes payload = 4;
}

// Raw input data forwarded from coordinator to worker.
// Ordering is guaranteed by the single per-worker gRPC stream (no sequence numbers needed).
message InputStreamData {
  string job_id = 1;
  bytes payload = 2;
}

message ExecuteTaskResponse {
  string job_id = 1;
  string worker_id = 2;
  TaskType task_type = 3;
  bool success = 4;
  string error_message = 5; // Optional error message if success is false
  oneof result_data {
    Execution execution = 6;
    ChallengesList challenges = 7;
    ProofList proofs = 8;
    FinalProof final_proof = 9;
    WrapResult wrap_result = 10;
  }
  bool worker_in_recovery = 11;
}

message WitnessExecInfo {
  float witness_time = 1;
  repeated uint64 publics = 2;
  repeated uint64 proof_values = 3;
  string summary_info = 4;
  uint64 total_instances = 5;
}

message AsmExecuteInfo {
  float time = 1;
  float mhz = 2;
}

message ZiskExecuteTime {
  float total_duration = 1;
  float execution_duration = 2;
  float count_and_plan_duration = 3;
  float count_and_plan_mo_duration = 4;
  optional AsmExecuteInfo asm_execution_duration = 5;
  double task_received_time = 6; // Time when task was received by worker (in milliseconds since UNIX epoch)
}

message ChallengesList {
  repeated Challenges challenges = 1;
  WitnessExecInfo witness_info = 2;
  ZiskExecuteTime zisk_execution_time = 3;
}

message Execution {
  uint64 instances = 1;
  uint64 executed_steps = 2;
  ZiskExecuteTime zisk_execution_time = 3;
  optional WitnessExecInfo witness_info = 4;
}

message Challenges {
  uint32 worker_index = 1;
  uint32 airgroup_id = 2;
  repeated uint64 challenge = 3;
}

message ProofList {
  repeated ProofStark proofs = 1;
}

message ProofStark {
  uint32 worker_idx = 1;
  uint64 airgroup_id = 2;
  repeated uint64 values = 3;
}

message FinalProof {
  bytes proof_data = 1;
  uint64 executed_steps = 2;
  uint64 instances = 3;
}

message WorkerError {
  string worker_id = 1;
  string job_id = 2;
  string error_message = 3;
}

message ComputeCapacity {
  uint32 compute_units = 1;
}

message JobCancelled {
  string job_id = 1;
  string reason = 2;
}

message ReconnectionDirective {
  ReconnectionAction action = 1;
}

enum ReconnectionAction {
  RECONNECTION_ACTION_IDLE = 0;
  RECONNECTION_ACTION_KEEP_COMPUTING = 1;
  RECONNECTION_ACTION_CANCEL_STALE_JOB = 2;
}