[package]
name = "zisk-coordinator-dashboard-integration"
description = "Live integration harness that observes a real coordinator proof run and asserts every metric/route reacts at each phase transition"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "integration-dashboard"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
clap = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
base64 = "0.22"
urlencoding = "2"

zisk-coordinator = { workspace = true }
