# gateway.toml — local Docker development configuration
# Mounted into the container at /etc/zisk/gateway.toml

[service]
name        = "ZisK Gateway (Docker)"
environment = "development"

[server]
host                     = "0.0.0.0"
port                     = 7000
shutdown_timeout_seconds = 30

[metrics]
enabled = true
host    = "0.0.0.0"
port    = 9090

[logging]
level  = "info"
format = "json"

[backend]
mode = "mock"

[coordinator]
url                      = "http://coordinator:50051"
connect_timeout_seconds  = 5
request_timeout_seconds  = 30
