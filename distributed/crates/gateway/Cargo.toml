[package]
name = "zisk-gateway"
description = "ZisK public API gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "zisk-gateway"
path = "src/cli/main.rs"

[dependencies]
zisk-cluster-common = { workspace = true }
zisk-distributed-grpc-api = { workspace = true }
zisk-coordinator = { workspace = true }

# gRPC
tonic = { workspace = true }
tonic-prost = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }

# Async
tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
async-trait = "0.1"
async-stream = "0.3"

# Types / serialization
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
blake3 = "1"
hex = "0.4"

# Config & CLI
config = { workspace = true }
clap = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

# Metrics
metrics = "0.24"
metrics-exporter-prometheus = "0.18"

# Graceful shutdown
signal-hook = "0.4"
signal-hook-tokio = { version = "0.4", features = ["futures-v0_3"] }

[build-dependencies]
tonic-prost-build = { workspace = true }

[[test]]
name = "api_test"
path = "tests/integration/api_test.rs"

[dev-dependencies]
tokio = { workspace = true }
tonic = { workspace = true }
tokio-stream = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
