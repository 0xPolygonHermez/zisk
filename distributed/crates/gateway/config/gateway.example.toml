# gateway.toml — ZisK Gateway configuration
#
# Copy this file to /etc/zisk/gateway.toml and edit to match your environment.
# All fields are optional — defaults are used when omitted.
#
# Override order (later entries win):
#   1. Defaults built into the binary
#   2. This file
#   3. ZISK_GATEWAY__* environment variables (double underscore as separator)
#   4. CLI flags (--port, --log-level, --backend)

# ── Service identity ──────────────────────────────────────────────────────────

[service]
# Human-readable name shown in logs and status output.
name = "ZisK Gateway"

# environment: development | staging | production
environment = "development"

# ── gRPC server ───────────────────────────────────────────────────────────────

[server]
# Address to listen on. Use 0.0.0.0 to accept connections on all interfaces.
host = "0.0.0.0"

# gRPC port. Override with --port or ZISK_GATEWAY_PORT.
port = 7000

# Seconds to drain in-flight requests after a shutdown signal before forcing exit.
shutdown_timeout_seconds = 30

# ── Metrics ───────────────────────────────────────────────────────────────────

[metrics]
# Set to false to disable the /metrics endpoint entirely.
enabled = true

# Address and port for the Prometheus scrape endpoint.
host = "0.0.0.0"
port = 9090

# Endpoints:
#   GET /metrics  → Prometheus text format
#   GET /health   → 200 OK (liveness probe)

# ── Logging ───────────────────────────────────────────────────────────────────

[logging]
# Minimum log level: trace | debug | info | warn | error
# RUST_LOG environment variable takes precedence and supports per-module filters.
# Example: RUST_LOG=zisk_gateway=debug,info
level = "info"

# Output format:
#   pretty  — human-readable, coloured (recommended for development)
#   json    — one JSON object per line (recommended for production / log aggregators)
#   compact — compact single-line format
format = "pretty"

# Optional: write logs to a rotating daily file in addition to stdout.
# file_path = "zisk-gateway.log"

# ── Backend ───────────────────────────────────────────────────────────────────

[backend]
# Backend implementation to use:
#   mock        — in-memory, no coordinator required (development / testing)
#   coordinator — forward to a real zisk-coordinator (phase 2, not yet implemented)
mode = "mock"

# ── Coordinator (used only when backend.mode = "coordinator") ─────────────────

[coordinator]
# gRPC URL of the zisk-coordinator.
url = "http://127.0.0.1:50051"

# Seconds to wait for the initial TCP connection to the coordinator.
connect_timeout_seconds = 5

# Per-RPC deadline sent to the coordinator.
request_timeout_seconds = 30
