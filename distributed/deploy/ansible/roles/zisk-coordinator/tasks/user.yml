---
- name: Ensure zisk-coordinator group exists
  ansible.builtin.group:
    name: "{{ zisk_coordinator_group }}"
    system: true
    state: present

- name: Ensure zisk-coordinator user exists
  ansible.builtin.user:
    name: "{{ zisk_coordinator_user }}"
    group: "{{ zisk_coordinator_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
    state: present
