---
- name: Ensure shared zisk group exists (read access to /opt/zisk bundle)
  ansible.builtin.group:
    name: "{{ zisk_coordinator_zisk_group }}"
    system: true
    state: present

- name: Ensure zisk-coordinator group exists
  ansible.builtin.group:
    name: "{{ zisk_coordinator_group }}"
    system: true
    state: present

- name: Ensure zisk-coordinator user exists (with zisk as supplementary group)
  ansible.builtin.user:
    name: "{{ zisk_coordinator_user }}"
    group: "{{ zisk_coordinator_group }}"
    groups: "{{ zisk_coordinator_zisk_group }}"
    append: true
    system: true
    create_home: false
    home: /var/empty
    shell: /usr/sbin/nologin
    state: present
