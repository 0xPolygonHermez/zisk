---
# Auto-detect MPI parameters by running scripts/common/mpi_params.sh on the
# target host, parsing its KEY=VAL output into facts. Only runs when no manual
# triplet was provided.

- name: Auto-detect MPI parameters from target hardware
  ansible.builtin.script:
    cmd: "{{ role_path }}/../../../scripts/common/mpi_params.sh --quiet"
  register: zisk_worker_mpi_detection
  changed_when: false
  when: zisk_worker_mpi_processes | string == ""

- name: Parse MPI auto-detect output into facts
  ansible.builtin.set_fact:
    zisk_worker_mpi_processes: >-
      {{ (zisk_worker_mpi_detection.stdout_lines
          | select('match', '^MPI_NP=') | first).split('=')[1] }}
    zisk_worker_mpi_numa_ppr: >-
      {{ (zisk_worker_mpi_detection.stdout_lines
          | select('match', '^MPI_PPR=') | first).split('=')[1] }}
    zisk_worker_mpi_threads: >-
      {{ (zisk_worker_mpi_detection.stdout_lines
          | select('match', '^MPI_RAYON_NUM_THREADS=') | first).split('=')[1] }}
  when:
    - zisk_worker_mpi_detection is defined
    - not (zisk_worker_mpi_detection is skipped)

- name: Resolve mpirun absolute path on target
  ansible.builtin.shell: command -v mpirun
  args:
    executable: /bin/bash
  register: zisk_worker_mpirun_lookup
  changed_when: false
  failed_when: zisk_worker_mpirun_lookup.rc != 0 or zisk_worker_mpirun_lookup.stdout | length == 0

- name: Set mpirun fact
  ansible.builtin.set_fact:
    zisk_worker_mpirun_bin: "{{ zisk_worker_mpirun_lookup.stdout }}"
