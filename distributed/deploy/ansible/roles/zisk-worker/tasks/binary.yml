---
- name: Install zisk-worker binary
  ansible.builtin.copy:
    src: "{{ zisk_worker_binary_src }}"
    dest: "{{ zisk_worker_binary_dst }}"
    mode: "0755"
    owner: root
    group: root
  notify: restart zisk-worker

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ zisk_worker_config_dir }}"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Install operator-supplied worker.toml
  ansible.builtin.copy:
    src: "{{ zisk_worker_config_src }}"
    dest: "{{ zisk_worker_config_dst }}"
    mode: "0640"
    owner: root
    group: "{{ zisk_worker_group }}"
  when: zisk_worker_config_src | length > 0
  notify: restart zisk-worker

# Mutable per-service state only. Read-only toolchain + proving key live in
# zisk_worker_bundle_dir (managed by bundle.yml).
- name: Ensure working directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ zisk_worker_user }}"
    group: "{{ zisk_worker_group }}"
    mode: "0755"
  loop:
    - "{{ zisk_worker_work_dir }}"
    - "{{ zisk_worker_work_dir }}/cache"
    - "{{ zisk_worker_work_dir }}/inputs"
    - "{{ zisk_worker_log_dir }}"
