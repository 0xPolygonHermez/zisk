apiVersion: 1

# Auto-provisioned at Grafana startup. The `uid` is pinned so panels and
# Grafana-managed alerts can reference job-history Postgres stably without
# embedding deployment-specific connection details.
datasources:
  - name: ZisK Postgres
    type: postgres
    uid: zisk-postgres
    access: proxy
    url: ${ZISK_POSTGRES_DATASOURCE_HOST}:${ZISK_POSTGRES_DATASOURCE_PORT}
    user: ${ZISK_POSTGRES_DATASOURCE_USER}
    editable: false
    jsonData:
      database: ${ZISK_POSTGRES_DATASOURCE_DB}
      sslmode: ${ZISK_POSTGRES_DATASOURCE_SSLMODE}
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: ${ZISK_POSTGRES_PASSWORD}
