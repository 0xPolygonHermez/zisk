# coordinator.toml — ZisK Coordinator Docker configuration
#
# Mounted into the coordinator container at /etc/zisk/coordinator.toml.
# Override individual values via environment variables (see env column in README)

[service]
coordinator_id = "default"
name = "ZisK Coordinator"
environment = "production"

[server]
host = "0.0.0.0"
port = 15100
shutdown_timeout_seconds = 30

[metrics]
enabled = true
host = "0.0.0.0"
port = 9091

[logging]
level = "info"
format = "json"

[backend]
mode = "coordinator"

[coordinator]
# Port on which the embedded coordinator listens for worker connections.
# Workers must connect to this port on the coordinator host/container.
port = 50052
# config_file = "/etc/zisk/coordinator.toml"  # optional: tune coordinator core internals

[job_history]
# Persist terminal job summaries and phase timing events to Postgres. The
# database URL is env-only by design; do not put credentials in this file.
enabled = true
auto_migrate = true
channel_capacity = 10000
batch_size = 100
flush_interval_ms = 250
