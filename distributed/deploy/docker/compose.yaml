# compose.yaml - ZisK distributed proving stack
#
# Usage (from the workspace root):
#
#   Start the coordinator only:
#     docker compose -f distributed/deploy/docker/compose.yaml up coordinator
#
#   Start the full stack with N workers:
#     docker compose -f distributed/deploy/docker/compose.yaml up --scale worker=4
#
#   Build with GPU support for workers:
#     docker compose -f distributed/deploy/docker/compose.yaml build --build-arg GPU=true worker

services:

  # Coordinator
  # Public gRPC API + embedded coordination engine.
  # Workers connect to the coordinator on port 50052 (internal to this container).
  coordinator:
    build:
      context: ../../..
      dockerfile: distributed/deploy/docker/Dockerfile.coordinator
    image: zisk-coordinator:latest
    container_name: zisk-coordinator
    restart: on-failure
    ports:
      - "15100:15100" # public gRPC API
      - "9091:9091" # Prometheus metrics
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - ZISK_COORDINATOR_ID=${ZISK_COORDINATOR_ID:-default}
      - ZISK_SCRAPE_TOKEN=${ZISK_SCRAPE_TOKEN:-}
      - ZISK_SCRAPE_TOKEN_FILE=/etc/zisk/secrets/zisk-scrape-token
      - ZISK_COORDINATOR_DATABASE_URL=${ZISK_COORDINATOR_DATABASE_URL:-postgres://zisk:zisk@postgres:5432/zisk_history}
    # Coordinator reads the same mounted scrape token file as Prometheus and Grafana.
    volumes:
      - ../config/coordinator.toml:/etc/zisk/coordinator.toml:ro
      - ${ZISK_SCRAPE_TOKEN_FILE:-../config/zisk-scrape-token.example}:/etc/zisk/secrets/zisk-scrape-token:ro
    networks:
      - zisk
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "grpc_health_probe", "-addr=:15100" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Worker
  # Scale with: docker compose up --scale worker=N
  # Each instance gets a unique auto-generated worker_id (no worker_id in config).
  worker:
    build:
      context: ../../..
      dockerfile: distributed/deploy/docker/Dockerfile.worker
      args:
        GPU: false # set to true for GPU-accelerated workers
    image: zisk-worker:latest
    restart: on-failure
    volumes:
      - ../config/worker.toml:/etc/zisk/worker.toml:ro
      # Mount the shared ZisK bundle (toolchain + proving key) read-only.
      # Default host path /opt/zisk matches `ziskup --system` output; override
      # via ZISK_HOME env var if your bundle lives elsewhere.
      - ${ZISK_HOME:-/opt/zisk}:/opt/zisk:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - ZISK_HOME=/opt/zisk
      - ZISK_CACHE_DIR=/app/cache
    depends_on:
      coordinator:
        condition: service_started # workers reconnect automatically, no need to wait for healthy
    networks:
      - zisk

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: zisk-prometheus
    restart: on-failure
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${ZISK_SCRAPE_TOKEN_FILE:-../config/zisk-scrape-token.example}:/etc/prometheus/zisk-scrape-token:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    networks:
      - zisk
    depends_on:
      coordinator:
        condition: service_healthy # wait for coordinator to pass health check before scraping

  # Grafana
  # Anonymous Admin auth on port 3000; restrict in any non-local deploy.
  # Datasource + dashboards auto-provisioned from ../grafana on first start.
  # Edits made via the UI persist (allowUiUpdates=true); export and commit JSON
  # back to ../grafana/dashboards/ to share.
  grafana:
    image: grafana/grafana:11.2.0
    container_name: zisk-grafana
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
      - ZISK_PROMETHEUS_URL=${ZISK_PROMETHEUS_URL:-http://prometheus:9090}
      - ZISK_COORDINATOR_API_URL=${ZISK_COORDINATOR_API_URL:-http://coordinator:9091}
      - ZISK_POSTGRES_DATASOURCE_HOST=${ZISK_POSTGRES_DATASOURCE_HOST:-postgres}
      - ZISK_POSTGRES_DATASOURCE_PORT=${ZISK_POSTGRES_DATASOURCE_PORT:-5432}
      - ZISK_POSTGRES_DATASOURCE_DB=${ZISK_POSTGRES_DATASOURCE_DB:-zisk_history}
      - ZISK_POSTGRES_DATASOURCE_USER=${ZISK_POSTGRES_DATASOURCE_USER:-zisk}
      - ZISK_POSTGRES_DATASOURCE_SSLMODE=${ZISK_POSTGRES_DATASOURCE_SSLMODE:-disable}
    env_file:
      # Shared credentials file. Holds ZISK_POSTGRES_PASSWORD so the Grafana
      # provisioning datasource can interpolate it without the value living
      # in this compose file.
      - ${ZISK_POSTGRES_ENV_FILE:-../config/postgres.env.example}
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
      # Grafana reads the shared scrape token via $__file{} provisioning.
      - ${ZISK_SCRAPE_TOKEN_FILE:-../config/zisk-scrape-token.example}:/etc/grafana/secrets/zisk-scrape-token:ro
      - grafana-data:/var/lib/grafana
    networks:
      - zisk
    depends_on:
      - prometheus

  # Postgres Job History
  postgres:
    image: postgres:16-alpine
    container_name: zisk-postgres
    restart: on-failure
    environment:
      - POSTGRES_USER=zisk
      - POSTGRES_DB=zisk_history
    env_file:
      # Operator-managed credentials file holding POSTGRES_PASSWORD (and any
      # other secrets). Path defaults to the example template so docker
      # compose can boot for a dry config check; override for real deploys.
      - ${ZISK_POSTGRES_ENV_FILE:-../config/postgres.env.example}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zisk
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U zisk -d zisk_history" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  grafana-data:
  postgres-data:

networks:
  zisk:
    driver: bridge
