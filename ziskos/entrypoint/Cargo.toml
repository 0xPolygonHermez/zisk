[package]
name = "ziskos"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
keywords = { workspace = true }
repository = { workspace = true }
categories = { workspace = true }

[lib]
crate-type = ["rlib"]

[dependencies]
zkvm-interface = { workspace = true }
lib-c = { workspace = true }

getrandom = { version = "0.2", features = ["custom"] }
cfg-if = "1.0"
ripemd = { version = "0.1.3", default-features = false }
zisk-definitions = { path = "../../definitions" }
critical-section = { version = "1.2.0", optional = true }
embedded-alloc = { version = "0.6.0", optional = true }
talc = { version = "4.4.3", default-features = false, features = ["lock_api"], optional = true }
dlmalloc = { version = "0.2", default-features = false, optional = true }
zisk-verifier = { workspace = true }

[target.'cfg(all(target_os = "zkvm", target_vendor = "zisk"))'.dependencies]
spin = "0.9"
rand = { version = "0.8.5", default-features = false, features = ["small_rng"] }
serde = { version = "1", default-features = false, features = ["derive"] }
bincode = { version = "2", default-features = false, features = ["alloc", "serde"] }

[target.'cfg(not(all(target_os = "zkvm", target_vendor = "zisk")))'.dependencies]
num-bigint = { workspace = true }
num-integer = { workspace = true }
num-traits = { workspace = true }
precompiles-helpers = { workspace = true }
lazy_static = "1.5.0"
libc = "0.2"
rand = { workspace = true }
serde = { workspace = true, features = ["derive"] }
aurora-engine-modexp = { version = "1.2", default-features = false }
ark-ec = { version = "0.5", default-features = false }
ark-serialize = { version = "0.5", default-features = false }
bincode = { workspace = true }
ark-bn254 = { workspace = true }
ark-ff = { workspace = true }
sha2 = { workspace = true }
tiny-keccak = { version = "2.0.0", features = ["keccak"] }
fields = { git = "https://github.com/0xPolygonHermez/pil2-proofman.git", tag = "v0.17.0", features = [
    "verify",
] }
blst = "0.3.16"
secp256k1 = { version = "0.31", features = ["recovery"] }

[target.'cfg(all(not(all(target_os = "zkvm", target_vendor = "zisk")), any(zisk_hints, zisk_hints_debug)))'.dependencies]
bytes = { version = "1.11.0", optional = true }
once_cell = { version = "1.21.3", optional = true }
paste = { version = "1.0", optional = true }
zisk-common = { path = "../../common", optional = true }
anyhow = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[target.'cfg(all(not(all(target_os = "zkvm", target_vendor = "zisk")), zisk_hints_metrics))'.dependencies]
ctor = { version = "0.2", optional = true }

[target.'cfg(not(all(target_os = "zkvm", target_vendor = "zisk")))'.dev-dependencies]
test-artifacts = { workspace = true }
zisk-common = { workspace = true }
serial_test = { workspace = true }

[features]
default = ["user-hints", "inputcpy"]
user-hints = [
    "dep:zisk-common",
    "dep:bytes",
    "dep:paste",
    "dep:once_cell",
    "dep:ctor",
    "dep:anyhow",
    "dep:tokio",
]
inputcpy = []
zisk-custom-alloc = []
zisk-embedded-alloc = ["zisk-embedded-dlmalloc-alloc"]
zisk-embedded-dlmalloc-alloc = [
    "dep:embedded-alloc",
    "dep:critical-section",
    "dep:dlmalloc",
]
zisk-embedded-talc-alloc = [
    "dep:embedded-alloc",
    "dep:critical-section",
    "dep:talc",
]
zisk-embedded-tlfs-alloc = ["dep:embedded-alloc", "dep:critical-section"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(zisk_hints)',
    'cfg(zisk_hints_metrics)',
    'cfg(zisk_hints_debug)',
    'cfg(zisk_hints_single_thread)',
    'cfg(target_vendor, values("zisk"))',
] }
