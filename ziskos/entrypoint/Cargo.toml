[package]
name = "ziskos"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
keywords = { workspace = true }
repository = { workspace = true }
categories = { workspace = true }

[dependencies]
lib-c = { workspace = true }

num-bigint = { workspace = true }
num-integer = { workspace = true }
num-traits = { workspace = true }

precompiles-helpers = { workspace = true }

lazy_static = "1.5.0"
rand = "0.8.5"
getrandom = { version = "0.2", features = ["custom"] }
cfg-if = "1.0"
tiny-keccak = { version = "2.0.0", features = ["keccak"] }
serde = { workspace = true, features = ["derive"] }

zisk-verifier = { workspace = true }
bincode = { workspace = true }
zisk-definitions = { path = "../../definitions" }
critical-section = { version = "1.2.0", optional = true }
embedded-alloc = { version = "0.6.0", optional = true }
talc = { version = "4.4.3", features = ["lock_api"], optional = true }
dlmalloc = { version = "0.2", default-features = false, optional = true }

sha2 = { workspace = true }
fields = { git = "https://github.com/0xPolygonHermez/pil2-proofman.git", branch = "pre-develop-0.16.0", features = [
    "verify",
] }

[target.'cfg(all(not(all(target_os = "zkvm", target_vendor = "zisk")), any(zisk_hints, zisk_hints_debug)))'.dependencies]
bytes = { version = "1.11.0", optional = true }
once_cell = { version = "1.21.3", optional = true }
paste = { version = "1.0", optional = true }
zisk-common = { path = "../../common", optional = true }
anyhow = { workspace = true, optional = true }
tokio = { workspace = true, optional = true}

[target.'cfg(all(not(all(target_os = "zkvm", target_vendor = "zisk")), zisk_hints_metrics))'.dependencies]
ctor = { version = "0.2", optional = true }

[features]
default = ["user-hints", "inputcpy"]
user-hints = ["dep:zisk-common", "dep:bytes", "dep:paste", "dep:once_cell", "dep:ctor", "dep:anyhow", "dep:tokio"]
inputcpy = []
zisk-custom-alloc = []
zisk-embedded-alloc = ["zisk-embedded-dlmalloc-alloc"]
zisk-embedded-dlmalloc-alloc = ["dep:embedded-alloc", "dep:critical-section", "dep:dlmalloc"]
zisk-embedded-talc-alloc = ["dep:embedded-alloc", "dep:critical-section", "dep:talc"]
zisk-embedded-tlfs-alloc = ["dep:embedded-alloc", "dep:critical-section"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
'cfg(zisk_hints)',
'cfg(zisk_hints_metrics)',
'cfg(zisk_hints_debug)',
'cfg(zisk_hints_single_thread)'] }
