name: Test ZisK

on:
  push:
    branches: [develop]
  pull_request:
    branches:
      - develop
      - main
      - "pre-develop-[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:    
  merge_group:

jobs:
  cargo-tests:
    name: Cargo tests
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin openmpi-common libopenmpi-dev nlohmann-json3-dev  build-essential libbenchmark-dev libomp-dev libgmp-dev  nasm libsodium-dev cmake

      - name: Setup CI
        uses: ./.github/actions/setup

      - name: Run cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --all-targets # --all-features

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --workspace --release --features no_lib_link
        env:
          RUSTFLAGS: -Copt-level=3 -Cdebug-assertions -Coverflow-checks=y -Cdebuginfo=0 -C target-cpu=native
          RUST_BACKTRACE: 1

  # test-x86_64:
  #   name: Test on x86_64
  #   runs-on: self-hosted
  #   steps:
  #     - name: Run docker zisk-test-env
  #       run: |
  #         docker run --rm --shm-size=32g \
  #           -e ZISK_GHA=1 \
  #           -e ZISK_BRANCH=pre-develop-0.11.0 \
  #           -e BLOCK_INPUTS_DISTRIBUTED=21429063_9_1.bin \
  #           -e DISTRIBUTED_PROCESSES=2 \
  #           -e DISTRIBUTED_THREADS=64 \
  #           -e PROVE_FLAGS="-a -y" \
  #           ziskvm/zisk-test-env:latest \
  #           /bin/bash -c "set -e && \
  #             source \$HOME/scripts/build_zisk.sh && \
  #             source \$HOME/scripts/install_setup_public.sh && \
  #             source \$HOME/scripts/test_sha_hasher.sh && \
  #             source \$HOME/scripts/test_eth_block.sh"    

  test-x86_64:
    name: Test on x86_64
    runs-on: self-hosted
    container:
      image: ubuntu:22.04
      options: --memory=128g --cpus=128 --shm-size=64g
    env:
      ZISK_GHA: "1"
      ZISK_BRANCH: ${{ github.head_ref }}
      BLOCK_INPUTS_DISTRIBUTED: "21429063_9_1.bin"
      DISTRIBUTED_PROCESSES: "2"
      DISTRIBUTED_THREADS: "64"
      PROVE_FLAGS: "-a -y"      
      TERM: xterm  
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:        
          path: $HOME/workspace   

      - name: Move repository to $HOME/workspace/zisk
        run: |
          mkdir -p $HOME/workspace
          rm -rf $HOME/workspace/zisk
          mv $GITHUB_WORKSPACE $HOME/workspace/zisk

      - name: Install dependencies
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./install_deps.sh

      - name: Build ZisK
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./build_zisk.sh

      - name: Install setup
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./install_setup_public.sh
  
      - name: Test sha_hasher
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./test_sha_hasher.sh

      - name: Test Ethereum block
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./test_eth_block.sh

  test-macos:
    name: Test on macOS
    runs-on: macos-14
    env:
      ZISK_GHA: "1"
      ZISK_BRANCH: ${{ github.head_ref }}
      TERM: xterm
    steps:
      - name: Check Rust version
        run: rustc --version

      - name: Checkout sources
        uses: actions/checkout@v4
        with:        
          path: $HOME/workspace        

      - name: Build ZisK
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./build_zisk.sh

      - name: Test sha_hasher
        run: |
          cd "$HOME/workspace/zisk/tools/release-kit"
          ./test_sha_hasher.sh

  lint:
    name: Formatting & Clippy
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin openmpi-common libopenmpi-dev

      - name: Setup CI
        uses: ./.github/actions/setup

      - name: Clean rust toolchain
        run: |
          rustup self uninstall -y || true
          rm -rf ~/.rustup ~/.cargo        

      - name: Install rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          default: true
          override: true
          components: rustfmt

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          toolchain: stable
          command: fmt
          args: --all -- --check
        env:
          CARGO_INCREMENTAL: 1

      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets -- -D warnings
          # args: --all-features --all-targets -- -D warnings -A incomplete-features
        env:
          CARGO_INCREMENTAL: 1
