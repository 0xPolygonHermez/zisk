[package]
name = "aggregation-host"
version = "0.1.0"
edition = "2021"

[dependencies]
zisk-sdk = { workspace = true }
anyhow = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
sha2 = "0.10.8"
examples-common = { path = "../../common" }

[build-dependencies]
zisk-sdk = { workspace = true }

[features]
default = []
gpu = ["examples-common/gpu"]
asm = ["examples-common/asm"]
remote = ["examples-common/remote"]