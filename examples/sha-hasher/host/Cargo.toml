[package]
name = "sha-hasher-host"
version = "0.1.0"
edition = "2021"

[dependencies]
zisk-sdk = { workspace = true }
sha-hasher-common = { path = "../common" }
anyhow = "1.0"
sha2 = "0.10.8"
# Pin: time 0.3.48 triggers a rustc E0119 coherence false-positive when built
# alongside rcgen 0.14.x (transitive via zisk-sdk). 0.3.47 is the newest version
# that satisfies vergen-git2's `time ^0.3.45` and avoids the bug.
time = "=0.3.47"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[build-dependencies]
zisk-sdk = { workspace = true }

[features]
default = []
gpu = []

[[bin]]
name = "prove"
path = "bin/embedded/prove.rs"

[[bin]]
name = "execute"
path = "bin/embedded/execute.rs"

[[bin]]
name = "plonk"
path = "bin/embedded/plonk.rs"

[[bin]]
name = "minimal"
path = "bin/embedded/minimal.rs"

[[bin]]
name = "run"
path = "bin/run.rs"

[[bin]]
name = "prove-remote"
path = "bin/remote/prove.rs"

[[bin]]
name = "execute-remote"
path = "bin/remote/execute.rs"

[[bin]]
name = "plonk-remote"
path = "bin/remote/plonk.rs"

[[bin]]
name = "minimal-remote"
path = "bin/remote/minimal.rs"
