[package]
name = "sha-hasher-host"
version = "0.1.0"
edition = "2021"

[dependencies]
zisk-sdk = { workspace = true }
anyhow = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"] }
sha2 = "0.10.8"

[build-dependencies]
zisk-sdk = { workspace = true }

[features]
default = []
packed = []
gpu = ["zisk-sdk/gpu"]

[[bin]]
name = "prove"
path = "bin/prove.rs"

[[bin]]
name = "execute"
path = "bin/execute.rs"

[[bin]]
name = "plonk"
path = "bin/plonk.rs"

[[bin]]
name = "reduced"
path = "bin/reduced.rs"

[[bin]]
name = "run"
path = "bin/run.rs"