[package]
name = "sha-hasher-host"
version = "0.1.0"
edition = "2021"

[dependencies]
zisk-sdk = { workspace = true }
anyhow = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"] }
sha2 = "0.10.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
alloy-sol-types = "1.5.7"
sha-hasher-common = { path = "../common" }

[build-dependencies]
zisk-sdk = { workspace = true }

[features]
default = []
gpu = []

[[bin]]
name = "prove"
path = "bin/embedded/prove.rs"

[[bin]]
name = "execute"
path = "bin/embedded/execute.rs"

[[bin]]
name = "plonk"
path = "bin/embedded/plonk.rs"

[[bin]]
name = "minimal"
path = "bin/embedded/minimal.rs"

[[bin]]
name = "run"
path = "bin/run.rs"

[[bin]]
name = "prove-remote"
path = "bin/remote/prove.rs"

[[bin]]
name = "execute-remote"
path = "bin/remote/execute.rs"

[[bin]]
name = "plonk-remote"
path = "bin/remote/plonk.rs"

[[bin]]
name = "minimal-remote"
path = "bin/remote/minimal.rs"
