[package]
name = "sha-hasher-host"
version = "0.1.0"
edition = "2021"

[dependencies]
zisk-sdk = { workspace = true }
anyhow = "1.0"
serde = { version = "1.0", default-features = false, features = ["derive"] }
sha2 = "0.10.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
alloy-sol-types = "1.5.7"
sha-hasher-common = { path = "../common" }

[build-dependencies]
zisk-sdk = { workspace = true }

[[bin]]
name = "prove"
path = "bin/prove.rs"

[[bin]]
name = "prove_async"
path = "bin/prove_async.rs"

[[bin]]
name = "execute"
path = "bin/execute.rs"

[[bin]]
name = "plonk"
path = "bin/plonk.rs"

[[bin]]
name = "minimal"
path = "bin/minimal.rs"

[[bin]]
name = "run"
path = "bin/run.rs"
