[workspace]
members = [
    "sha-hasher/host", 
    "sha-hasher/guest", 
    "multiple-programs/host",
    "multiple-programs/guest",
    "aggregation/host",
    "aggregation/guest",
    "big-program/host",
    "big-program/guest",
    "hints/host",
    "panic/host",
    "panic/guest",
    "liveness/host",
    "liveness/guest",
]

resolver = "2"

[profile.release]
opt-level = 3

[workspace.dependencies]
# Guest dependencies
ziskos = { path = "../ziskos/entrypoint" }

# Host dependencies
zisk-sdk = { path = "../sdk" }