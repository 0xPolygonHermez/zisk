[workspace]
members = [
    "sha-hasher/host",
    "multiple-programs/host",
    "aggregation/host",
    "big-program/host",
    "hints/host",
]

resolver = "2"

[profile.release]
opt-level = 3

[workspace.dependencies]
ziskos = { path = "../ziskos/entrypoint" }
zisk-sdk = { path = "../sdk" }
test-artifacts = { path = "../test-artifacts" }
