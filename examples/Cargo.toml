[workspace]
members = ["sha-hasher/host", "sha-hasher/guest", "multiple-programs/host", "multiple-programs/guest", "multiple-programs/guest_2", "big-program/host", "big-program/guest"]

resolver = "2"

[profile.release]
opt-level = 3

[profile.release.package."proofman-verifier"]
opt-level = 0

[workspace.dependencies]
# Guest dependencies
ziskos = { path = "../ziskos/entrypoint" }

# Host dependencies
zisk-sdk = { path = "../sdk" }