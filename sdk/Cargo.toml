[package]
name = "zisk-sdk"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
keywords = { workspace = true }
repository = { workspace = true }
categories = { workspace = true }

[dependencies]
# Zisk prover backend (contains prover and guest types)
zisk-prover-backend = { workspace = true }

# Common dependencies
proofman-common = { workspace = true }
zisk-common = { workspace = true }
zisk-build = { workspace = true }
fields = { workspace = true }

# Utilities
anyhow = { workspace = true }
colored = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
zisk-distributed-common = { workspace = true }

# For utils.rs
rom-setup = { workspace = true }

[features]
default = []
gpu = ["zisk-prover-backend/gpu"]
packed = ["zisk-prover-backend/packed"]
stats = ["zisk-prover-backend/stats"]
disable_distributed = [
    "zisk-prover-backend/disable_distributed",
    "zisk-common/disable_distributed",
    "zisk-build/disable_distributed",
]
diagnostic = ["zisk-prover-backend/diagnostic"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(distributed)'] }
