[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "blake2",
    "bls12_381",
    "bn254",
    "diagnostic",
    "keccak",
    "modexp",
    "poseidon2",
    "secp256k1",
    "secp256r1",
    "sha256",
    "uint256",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[workspace.dependencies]
ziskos = { path = "../../ziskos/entrypoint" }
zisk-sdk = { path = "../../sdk" }
precompiles-helpers = { path = "../../precompiles/helpers" }

rand = "0.8.1"

