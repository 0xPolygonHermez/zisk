[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "blake2",
    "diagnostic",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[workspace.dependencies]
ziskos = { path = "../../ziskos/entrypoint" }
zisk-sdk = { path = "../../sdk" }
precompiles-helpers = { path = "../../precompiles/helpers" }

