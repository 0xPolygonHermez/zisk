[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
  "bigint",
  "bls12_381",
  "bn254",
  "examples/*",
  "diagnostic",
  "hashes",
  "secp256k1",
  "secp256r1",
  "syscalls/*",
  "uint256",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[workspace.dependencies]
ziskos = { path = "../../ziskos/entrypoint" }
zisk-core = { path = "../../core" }
zisk-sdk = { path = "../../sdk" }
precompiles-helpers = { path = "../../precompiles/helpers" }

rand = "0.8.1"
ruint = { version = "1", default-features = false }

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(target_vendor, values("zisk"))',
] }
