[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
  "bls12_381",
  "bn254",
  "examples/*",
  "diagnostic",
  "modexp",
  "secp256k1",
  "secp256r1",
  "syscalls/*",
  "uint256",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[workspace.dependencies]
ziskos = { path = "../../ziskos/entrypoint" }
zisk-sdk = { path = "../../sdk" }
precompiles-helpers = { path = "../../precompiles/helpers" }

rand = "0.8.1"

