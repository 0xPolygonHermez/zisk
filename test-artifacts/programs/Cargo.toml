[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    "bls12_381",
    "bn254",
    "diagnostic",
    "modexp",
    "secp256k1",
    # "secp256r1", // Too big
    "syscalls/add256",
    "syscalls/arith256",
    "syscalls/arith256_mod",
    "syscalls/arith384_mod",
    "syscalls/blake2",
    "syscalls/bls12_381_add",
    "syscalls/bls12_381_complex_add",
    "syscalls/bls12_381_complex_mul",
    "syscalls/bls12_381_complex_sub",
    "syscalls/bls12_381_dbl",
    "syscalls/bn254_add",
    "syscalls/bn254_complex_add",
    "syscalls/bn254_complex_mul",
    "syscalls/bn254_complex_sub",
    "syscalls/bn254_dbl",
    "syscalls/keccak",
    "syscalls/poseidon2",
    "syscalls/secp256k1_add",
    "syscalls/secp256k1_dbl",
    "syscalls/secp256r1_add",
    "syscalls/secp256r1_dbl",
    "syscalls/sha256",
    "uint256",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[workspace.dependencies]
ziskos = { path = "../../ziskos/entrypoint" }
zisk-sdk = { path = "../../sdk" }
precompiles-helpers = { path = "../../precompiles/helpers" }

rand = "0.8.1"

# [workspace.lints.rust]
