[package]
name = "asm-runner"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
keywords = { workspace = true }
repository = { workspace = true }
categories = { workspace = true }

build = "build.rs"

[lib]
name = "asm_runner"
path = "src/lib.rs"

[dependencies]
zisk-common = { workspace = true }
zisk-core = { workspace = true }
mem-planner-cpp = { workspace = true }
mem-common = { workspace = true }
proofman-common = { workspace = true }
proofman-util = { workspace = true }

tracing = { workspace = true}
rayon = { workspace = true}
anyhow = { workspace = true}

libc = "0.2"
thiserror = { workspace = true }

[target.'cfg(all(target_os = "linux", target_arch = "x86_64"))'.dependencies]
named-sem = { workspace = true }

[features]
stats = []
save_mem_plans = []
cpu-only = ["mem-planner-cpp/cpu-only"]

[lints.rust]
# `gpu` is set by build.rs only when CUDA is detected; declare it so the
# `unexpected_cfgs` lint does not flag it on non-GPU targets (e.g. macOS CI).
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(gpu)'] }
